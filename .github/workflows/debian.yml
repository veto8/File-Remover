name: Debian
on:
  push:
    branches: ["main"]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write 
  issues: read
  packages: none

jobs:
  build:
    if: github.repository_owner == 'myridia'
    runs-on: ubuntu-latest
    steps:
      - name: Dependencies
        run: |
         sudo apt-get update -y
         sudo apt-get install build-essential cmake libcurl4-openssl-dev libjansson-dev devscripts debhelper dh-make fakeroot tree -y
         
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
         cd make_deb/src
         dpkg-buildpackage -us -uc -b 
         cd ../../
         tree         

      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: 'make_deb/ftl-maker_1.1-1_all.deb'
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true

         


          
