name: Mac
on:
  push:
    branches: ["main"]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write 
  issues: read
  packages: none

jobs:
  build_macos_intel:
    if: github.repository_owner == 'myridiax'
    runs-on: macos-latest
    steps:
       - name: Dependencies
         run: |
          brew install jansson tree
       - name: Checkout
         uses: actions/checkout@v4

       - name: Build
         run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build       
          mv build/ftl_maker ftl_maker_mac.app  
          hdiutil create -volname "ftl_maker_mac" -srcfolder "ftl_maker_mac.app" -ov -format UDZO "ftl_maker_mac.dmg"
          tree
          
       - name: Release
         uses: svenstaro/upload-release-action@v2
         with:
           repo_token: ${{ secrets.GITHUB_TOKEN }}
           file: 'ftl_maker_mac.dmg'
           tag: ${{ github.ref }}
           overwrite: true
           file_glob: true
